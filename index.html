<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉義日常飲食地圖 - 藝術插畫版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #f47321;
            --brand-green: #10b981;
            --brand-beige: #fef9f3;
            --brand-dark: #1a1a1a;
            --brand-gray: #e5e5e5;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--brand-beige);
            color: var(--brand-dark);
        }
        #map {
            height: 600px;
            width: 100%;
            border-radius: 4px;
            z-index: 1;
            filter: grayscale(1) sepia(0.2) contrast(0.9) brightness(1.05);
        }
        .leaflet-container {
            background: var(--brand-beige);
        }
        .custom-popup .leaflet-popup-content-wrapper {
            background-color: var(--brand-beige);
            border-radius: 0;
            box-shadow: 4px 4px 0px var(--brand-dark);
            border: 1px solid var(--brand-dark);
        }
        .custom-popup .leaflet-popup-tip {
            background: var(--brand-dark);
        }
        .shop-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid var(--brand-gray);
        }
        .shop-card:hover {
            background-color: white;
            padding-left: 1.5rem;
        }
        .shop-card.active {
            background-color: white;
            border-bottom-color: var(--brand-dark);
            box-shadow: inset 8px 0 0 var(--active-color);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
    </style>
</head>
<body class="antialiased">

    <div class="flex flex-col min-h-screen">
        <div class="flex flex-col lg:flex-row flex-1">
            
            <!-- 側邊欄 (左) -->
            <aside class="w-full lg:w-[400px] bg-white border-r border-slate-200 flex flex-col z-20 shadow-xl">
                <div class="p-8 border-b border-slate-100">
                    <div class="flex items-baseline gap-2 mb-2">
                        <span class="text-5xl font-black tracking-tighter text-slate-200">01</span>
                        <h1 class="text-3xl font-black tracking-widest text-slate-900">嘉義</h1>
                    </div>
                    <p class="text-xs tracking-[0.2em] font-bold text-orange-500 uppercase mb-6">Daily Food Map / SE Asia</p>
                    
                    <div class="flex flex-wrap gap-2">
                        <button onclick="filterShops('all')" id="btn-all" class="px-4 py-1 text-xs font-bold border border-slate-900 bg-slate-900 text-white transition-all">ALL</button>
                        <button onclick="filterShops('indonesia')" id="btn-indo" class="px-4 py-1 text-xs font-bold border border-slate-900 hover:bg-slate-900 hover:text-white transition-all">INDONESIA</button>
                        <button onclick="filterShops('vietnam')" id="btn-viet" class="px-4 py-1 text-xs font-bold border border-slate-900 hover:bg-slate-900 hover:text-white transition-all">VIETNAM</button>
                    </div>
                </div>

                <div id="shop-list" class="flex-1 overflow-y-auto no-scrollbar">
                    <!-- 店家卡片將在此生成 -->
                </div>

                <div class="p-6 bg-slate-50 text-[10px] tracking-widest font-medium text-slate-400 border-t border-slate-100">
                    DESIGN INSPIRED BY TAINAN EAST DISTRICT AESTHETICS
                </div>
            </aside>

            <!-- 地圖區域 (右) -->
            <main class="flex-1 relative bg-white">
                <div id="map" class="h-full w-full"></div>
                
                <!-- 裝飾文字 -->
                <div class="absolute top-10 right-10 z-[1000] pointer-events-none hidden md:block">
                    <div class="flex gap-4">
                        <div class="vertical-text text-6xl font-black text-slate-100 uppercase opacity-50">Chiayi City</div>
                        <div class="vertical-text text-2xl font-bold text-orange-500 opacity-80 mt-12">日常飲食地圖</div>
                    </div>
                </div>

                <!-- 圖例 -->
                <div class="absolute bottom-10 left-10 z-[1000] bg-white border border-slate-900 p-6 shadow-[8px_8px_0px_rgba(0,0,0,1)]">
                    <h4 class="font-black text-sm mb-4 tracking-widest border-b border-slate-200 pb-2">MAP LEGEND</h4>
                    <div class="space-y-3">
                        <div class="flex items-center gap-3">
                            <span class="w-4 h-4 bg-orange-500 border border-slate-900"></span>
                            <span class="text-xs font-bold tracking-widest uppercase">INDONESIA 印尼</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="w-4 h-4 bg-emerald-500 border border-slate-900"></span>
                            <span class="text-xs font-bold tracking-widest uppercase">VIETNAM 越南</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const shops = [
            { id: 1, type: 'indonesia', name: 'Toko indo Nely', addr: '嘉義市西區中山路 (嘉義火車站前)', lat: 23.4795, lng: 120.4402, note: '印尼百貨與日常飲食', url: 'https://www.google.com/maps/search/?api=1&query=Toko+indo+Nely+Chiayi' },
            { id: 2, type: 'indonesia', name: 'Warung Indo Podomoro', addr: '嘉義市西區仁愛路附近', lat: 23.4812, lng: 120.4415, note: '道地印尼菜餚', url: 'https://www.google.com/maps/search/?api=1&query=Warung+Indo+Podomoro+chiayi' },
            { id: 3, type: 'indonesia', name: 'INDEX 南洋百貨(嘉義店)', addr: '嘉義市中山路528號', lat: 23.4790, lng: 120.4408, note: '連鎖東南亞超市', url: 'https://www.google.com/maps/search/?api=1&query=INDEX+南洋百貨(嘉義店)' },
            { id: 4, type: 'indonesia', name: 'Warung Kita', addr: '嘉義市西區站前區域', lat: 23.4785, lng: 120.4425, note: '印尼風味小吃店', url: 'https://www.google.com/maps/search/?api=1&query=Warung+Kita+Chiayi' },
            { id: 5, type: 'indonesia', name: 'TOKO TANAH EMAS', addr: '嘉義市西區火車站周邊', lat: 23.4805, lng: 120.4395, note: '印尼移工生活物資與雜貨', url: 'https://www.google.com/maps/search/?api=1&query=TOKO+TANAH+EMAS+CHIAYI' },
            { id: 6, type: 'indonesia', name: 'Halal Toko Wiwi Restaurant', addr: '嘉義市西區中正路', lat: 23.4778, lng: 120.4412, note: '清真認證印尼餐廳', url: 'https://www.google.com/maps/search/?api=1&query=Halal+Toko+Wiwi+Restaurant' },
            { id: 7, type: 'vietnam', name: '婉貞越南美食', addr: '嘉義市西區仁愛路', lat: 23.4755, lng: 120.4435, note: '經典越式河粉與春捲', url: 'https://www.google.com/maps/search/?api=1&query=婉貞越南美食' },
            { id: 8, type: 'vietnam', name: 'A Mai 台越美食', addr: '嘉義市東區', lat: 23.4825, lng: 120.4455, note: '結合台灣口味的越南料理', url: 'https://www.google.com/maps/search/?api=1&query=A+Mai+台越美食' },
            { id: 9, type: 'vietnam', name: '阿嬌越南雜貨 Tap Hóa Việt Nam', addr: '嘉義市西區', lat: 23.4765, lng: 120.4385, note: '越南食品與調味料專賣', url: 'https://www.google.com/maps/search/?api=1&query=阿嬌越南雜貨+Chiayi' },
            { id: 10, type: 'vietnam', name: 'TOKO INDO FANGJI', addr: '嘉義市西區', lat: 23.4798, lng: 120.4428, note: '越南/印尼綜合百貨', url: 'https://www.google.com/maps/search/?api=1&query=TOKO+INDO+FANGJI' },
            { id: 11, type: 'vietnam', name: '越南咖啡和現打果汁', addr: '嘉義市西區站前區域', lat: 23.4808, lng: 120.4442, note: '越式煉乳咖啡與新鮮果汁', url: 'https://www.google.com/maps/search/?api=1&query=嘉義+越南咖啡和現打果汁' },
            { id: 12, type: 'vietnam', name: '越南美食 QUÁN ĂN VIỆT NAM', addr: '嘉義市西區', lat: 23.4742, lng: 120.4465, note: '正宗越南家常菜', url: 'https://www.google.com/maps/search/?api=1&query=嘉義+越南美食+QUÁN+ĂN+VIỆT+NAM' }
        ];

        let map;
        let markers = [];
        const chiayiCenter = [23.479, 120.441];

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(chiayiCenter, 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CartoDB' }).addTo(map);
            renderMarkers('all');
            renderList('all');
        }

        function renderMarkers(filter) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            const filteredShops = filter === 'all' ? shops : shops.filter(s => s.type === filter);

            filteredShops.forEach(shop => {
                const color = shop.type === 'indonesia' ? '#f47321' : '#10b981';
                const markerHtml = `<div style="background-color: ${color}; width: 12px; height: 12px; border: 2px solid white; outline: 1px solid ${color};"></div>`;
                const customIcon = L.divIcon({ html: markerHtml, className: '', iconSize: [12, 12], iconAnchor: [6, 6] });

                const marker = L.marker([shop.lat, shop.lng], { icon: customIcon })
                    .bindPopup(`
                        <div class="custom-popup p-2">
                            <h3 class="font-black text-lg mb-1">${shop.name}</h3>
                            <p class="text-[10px] tracking-widest font-bold mb-2 uppercase" style="color: ${color}">${shop.type}</p>
                            <p class="text-xs text-slate-600 mb-3">${shop.note}</p>
                            <a href="${shop.url}" target="_blank" class="inline-block px-3 py-1 bg-slate-900 text-white text-[10px] font-bold tracking-widest">GOOGLE MAPS</a>
                        </div>
                    `)
                    .addTo(map);
                markers.push(marker);
            });
        }

        function renderList(filter) {
            const listContainer = document.getElementById('shop-list');
            listContainer.innerHTML = '';
            const filteredShops = filter === 'all' ? shops : shops.filter(s => s.type === filter);

            filteredShops.forEach((shop, index) => {
                const num = (index + 1).toString().padStart(2, '0');
                const accentColor = shop.type === 'indonesia' ? '#f47321' : '#10b981';

                const card = document.createElement('div');
                card.className = `shop-card p-6 cursor-pointer flex gap-6 items-start`;
                card.style.setProperty('--active-color', accentColor);
                card.innerHTML = `
                    <span class="text-2xl font-black opacity-30" style="color: ${accentColor}">${num}</span>
                    <div class="flex-1">
                        <div class="flex items-center justify-between mb-1">
                            <h3 class="font-bold text-lg tracking-tight">${shop.name}</h3>
                            <a href="${shop.url}" target="_blank" onclick="event.stopPropagation()" class="text-slate-300 hover:text-slate-900">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14L21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
                            </a>
                        </div>
                        <p class="text-xs text-slate-400 tracking-wide">${shop.addr}</p>
                    </div>
                `;
                
                card.onclick = () => {
                    document.querySelectorAll('.shop-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    map.setView([shop.lat, shop.lng], 17);
                    const markerIndex = filteredShops.findIndex(s => s.id === shop.id);
                    if (markers[markerIndex]) markers[markerIndex].openPopup();
                };
                listContainer.appendChild(card);
            });
        }

        function filterShops(type) {
            const btns = { 'all': document.getElementById('btn-all'), 'indonesia': document.getElementById('btn-indo'), 'vietnam': document.getElementById('btn-viet') };
            Object.values(btns).forEach(b => { b.classList.remove('bg-slate-900', 'text-white'); b.classList.add('text-slate-900'); });
            btns[type].classList.add('bg-slate-900', 'text-white');
            renderMarkers(type);
            renderList(type);
            if (type !== 'all') {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.5));
            } else { map.setView(chiayiCenter, 15); }
        }

        window.onload = initMap;
    </script>
</body>
</html>
